<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>Altasalta</title>
<style>
  :root{
    --bg: #0a0d16;
    --panel: #121726;
    --panel2: #1a2032;
    --panel3: #212840;
    --accent: #5b8cff;
    --accent2: #9c6cff;
    --success: #34d399;
    --danger: #ff4d6d;
    --amber: #ffb454;
    --text: #f2f4f9;
    --muted: #8890a6;
    --border: #232a40;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg); color:var(--text);
    font-family:-apple-system,'SF Pro Text','Segoe UI',Roboto,sans-serif;
    overflow:hidden; overscroll-behavior:none;
  }
  input, textarea{ user-select:text; -webkit-user-select:text; }
  button{ font-family:inherit; }
  ::selection{ background:rgba(91,140,255,.35); }

  #app{ position:relative; height:100vh; height:100dvh; width:100vw; }
  .screen{
    position:absolute; inset:0; display:flex; flex-direction:column;
    transform:translateX(0); opacity:1; transition:transform .32s cubic-bezier(.22,1,.36,1), opacity .28s;
    visibility:hidden; pointer-events:none;
  }
  .screen.active{ visibility:visible; pointer-events:auto; z-index:5; }
  .screen.slide-in-right{ transform:translateX(100%); }
  .screen.slide-in-right.active{ transform:translateX(0); }

  @keyframes fadeUp{ from{ opacity:0; transform:translateY(10px); } to{ opacity:1; transform:translateY(0); } }
  @keyframes popIn{ from{ opacity:0; transform:scale(.9); } to{ opacity:1; transform:scale(1); } }
  @keyframes shimmer{ 0%{ background-position:-200px 0; } 100%{ background-position:200px 0; } }

  /* ============ ОНБОРДИНГ ============ */
  #onboarding{
    align-items:center; justify-content:center; padding:32px;
    background:
      radial-gradient(circle at 25% 15%, rgba(91,140,255,.18), transparent 45%),
      radial-gradient(circle at 80% 75%, rgba(156,108,255,.14), transparent 50%),
      var(--bg);
  }
  .logo-wrap{ text-align:center; margin-bottom:38px; animation:fadeUp .5s ease; }
  .logo-mark{
    width:82px; height:82px; border-radius:24px; margin:0 auto 18px;
    background:linear-gradient(135deg, var(--accent), var(--accent2));
    display:flex; align-items:center; justify-content:center; font-size:36px;
    box-shadow:0 14px 34px rgba(91,140,255,.4), inset 0 1px 0 rgba(255,255,255,.25);
    animation:popIn .5s cubic-bezier(.34,1.56,.64,1);
  }
  .logo-wrap h1{
    font-size:28px; letter-spacing:1px; margin:0 0 6px; font-weight:800;
    background:linear-gradient(135deg,#fff,#b8c4ff); -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .logo-wrap p{ color:var(--muted); font-size:13.5px; margin:0; }
  #onboarding-form{ width:100%; max-width:340px; animation:fadeUp .6s ease .1s backwards; }
  #onboarding-form input{
    width:100%; background:var(--panel2); border:1.5px solid var(--border); color:var(--text);
    padding:16px; border-radius:16px; font-size:16px; font-family:inherit; margin-bottom:14px;
    transition:border-color .2s;
  }
  #onboarding-form input:focus{ outline:none; border-color:var(--accent); }
  .btn-primary{
    width:100%; padding:16px; border:none; border-radius:16px; font-size:15px; font-weight:800;
    background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#fff; cursor:pointer;
    min-height:52px; box-shadow:0 10px 26px rgba(91,140,255,.3); transition:transform .12s;
  }
  .btn-primary:active{ transform:scale(.97); }
  .btn-primary:disabled{ opacity:.4; }
  .onboarding-note{ color:var(--muted); font-size:11.5px; text-align:center; margin-top:16px; line-height:1.5; }

  /* ============ ГЛАВНЫЙ ЭКРАН ============ */
  #main-header{
    padding: max(16px, env(safe-area-inset-top)) 18px 12px;
    display:flex; align-items:center; justify-content:space-between;
    border-bottom:1px solid var(--border);
    background:rgba(10,13,22,.7); -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px);
  }
  #main-header h2{
    margin:0; font-size:21px; font-weight:800; letter-spacing:.2px;
    background:linear-gradient(135deg,#fff,#c2ccff); -webkit-background-clip:text; background-clip:text; color:transparent;
  }
  .header-icon-btn{
    background:var(--panel2); border:1px solid var(--border); color:var(--text); width:40px; height:40px;
    border-radius:50%; font-size:16px; cursor:pointer; display:flex; align-items:center; justify-content:center;
    transition:transform .12s;
  }
  .header-icon-btn:active{ transform:scale(.9); }

  .tabs-row{ display:flex; gap:8px; padding:12px 16px 6px; }
  .tab-btn{
    flex:1; padding:11px; border-radius:13px; border:1px solid var(--border); background:var(--panel2);
    color:var(--muted); font-size:13.5px; font-weight:700; cursor:pointer; position:relative; transition:all .2s;
  }
  .tab-btn.active{ background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#fff; border-color:transparent; }
  .tab-dot{
    display:inline-block; width:7px; height:7px; border-radius:50%; background:var(--success);
    margin-left:6px; vertical-align:middle;
  }

  .list-scroll{ flex:1; overflow-y:auto; padding: 6px 12px calc(12px + env(safe-area-inset-bottom)); }

  .chat-row{
    display:flex; align-items:center; gap:12px; padding:12px 10px; border-radius:16px; cursor:pointer;
    transition:background .15s; animation:fadeUp .35s ease backwards;
  }
  .chat-row:active{ background:var(--panel2); transform:scale(.99); }
  .avatar{
    width:52px; height:52px; border-radius:50%; flex-shrink:0;
    display:flex; align-items:center; justify-content:center; font-weight:800; font-size:19px; color:#fff;
    position:relative; box-shadow:inset 0 -3px 8px rgba(0,0,0,.15);
  }
  .avatar.sm{ width:38px; height:38px; font-size:14px; }
  .avatar-ring{
    position:absolute; inset:-3px; border-radius:50%; border:2px solid var(--success);
    animation:ringGlow 2.4s infinite ease-in-out;
  }
  @keyframes ringGlow{ 0%,100%{ opacity:.5; transform:scale(1); } 50%{ opacity:1; transform:scale(1.05); } }
  .online-dot{
    position:absolute; bottom:1px; right:1px; width:13px; height:13px; border-radius:50%;
    background:var(--success); border:2.5px solid var(--panel);
  }
  .chat-row-body{ flex:1; min-width:0; }
  .chat-row-top{ display:flex; justify-content:space-between; align-items:baseline; gap:8px; }
  .chat-row-name{ font-weight:700; font-size:15.5px; }
  .chat-row-time{ font-size:11px; color:var(--muted); flex-shrink:0; }
  .chat-row-preview-row{ display:flex; align-items:center; gap:5px; margin-top:3px; }
  .chat-row-preview{ font-size:13px; color:var(--muted); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; flex:1; }
  .unread-badge{
    background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#fff; font-size:11px; font-weight:800;
    min-width:20px; height:20px; border-radius:10px; display:flex; align-items:center; justify-content:center;
    padding:0 6px; flex-shrink:0;
  }
  .ticks{ font-size:13px; flex-shrink:0; }
  .ticks.read{ color:var(--accent); }
  .ticks.other{ color:var(--muted); }

  .empty-block{ text-align:center; color:var(--muted); padding:70px 24px; font-size:13.5px; line-height:1.6; animation:fadeUp .4s ease; }
  .empty-block .big{ font-size:38px; margin-bottom:12px; }

  /* skeleton loaders */
  .skeleton-row{ display:flex; align-items:center; gap:12px; padding:12px 10px; }
  .skel{
    background:linear-gradient(90deg, var(--panel2) 25%, var(--panel3) 37%, var(--panel2) 63%);
    background-size:400px 100%; animation:shimmer 1.4s infinite linear; border-radius:8px;
  }
  .skel.avatar{ width:52px; height:52px; border-radius:50%; flex-shrink:0; }
  .skel-lines{ flex:1; }
  .skel-line{ height:12px; border-radius:6px; margin-bottom:8px; }

  /* ============ ПЕРЕПИСКА ============ */
  #chat-screen{ background:var(--bg); }
  #chat-header{
    padding: max(14px, env(safe-area-inset-top)) 10px 12px;
    display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--border);
    background:rgba(18,23,38,.85); -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px);
  }
  #chat-header .chat-title{ flex:1; min-width:0; }
  #chat-header .chat-title .name{ font-weight:800; font-size:15.5px; }
  #chat-header .chat-title .status{ font-size:11.5px; color:var(--muted); transition:color .2s; }
  #chat-header .chat-title .status.online{ color:var(--success); }
  .call-btn{
    background:linear-gradient(135deg, var(--success), #17a982); border:none; color:#03211a;
    width:42px; height:42px; border-radius:50%; font-size:19px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; transition:transform .12s;
    box-shadow:0 6px 16px rgba(52,211,153,.3);
  }
  .call-btn:active{ transform:scale(.9); }

  #messages-list{ flex:1; overflow-y:auto; padding:16px 12px 10px; display:flex; flex-direction:column; gap:3px; }
  .msg-row{ display:flex; flex-direction:column; margin-bottom:9px; animation:fadeUp .25s ease backwards; }
  .msg-row.mine{ align-items:flex-end; }
  .msg-row.theirs{ align-items:flex-start; }
  .bubble-wrap{ position:relative; max-width:78%; }
  .bubble{
    padding:10px 14px; border-radius:19px; font-size:14.5px; line-height:1.42;
    word-break:break-word; position:relative;
  }
  .msg-row.theirs .bubble{ background:var(--panel2); border-bottom-left-radius:6px; }
  .msg-row.mine .bubble{
    background:linear-gradient(135deg, var(--accent), var(--accent2)); color:#fff; border-bottom-right-radius:6px;
  }
  .bubble-meta{ display:flex; align-items:center; gap:4px; justify-content:flex-end; margin-top:3px; padding:0 4px; }
  .msg-time{ font-size:10.5px; color:var(--muted); }
  .msg-tick{ font-size:12px; color:var(--muted); }
  .msg-tick.read{ color:var(--accent); }
  .msg-deleted{ font-style:italic; color:var(--muted) !important; background:transparent !important; border:1px dashed var(--border) !important; }

  .reactions-row{ display:flex; gap:3px; margin-top:-8px; z-index:2; position:relative; padding:0 6px; }
  .msg-row.mine .reactions-row{ justify-content:flex-end; }
  .reaction-chip{
    background:var(--panel3); border:1px solid var(--border); border-radius:12px; padding:2px 7px;
    font-size:12px; display:flex; align-items:center; gap:2px; box-shadow:0 2px 6px rgba(0,0,0,.25);
  }

  .typing-row{ display:flex; align-items:center; gap:8px; padding:6px 4px; animation:fadeUp .2s ease; }
  .typing-bubble{
    background:var(--panel2); border-radius:19px; border-bottom-left-radius:6px; padding:12px 16px;
    display:flex; gap:4px; align-items:center;
  }
  .typing-dot{ width:6px; height:6px; border-radius:50%; background:var(--muted); animation:typingBounce 1.2s infinite; }
  .typing-dot:nth-child(2){ animation-delay:.15s; }
  .typing-dot:nth-child(3){ animation-delay:.3s; }
  @keyframes typingBounce{ 0%,60%,100%{ transform:translateY(0); opacity:.5; } 30%{ transform:translateY(-5px); opacity:1; } }

  #chat-input-row{
    display:flex; gap:8px; padding:10px 12px; border-top:1px solid var(--border);
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    background:rgba(18,23,38,.85); -webkit-backdrop-filter:blur(16px); backdrop-filter:blur(16px);
  }
  #chat-input-row input{
    flex:1; background:var(--panel2); border:1.5px solid var(--border); color:var(--text);
    border-radius:24px; padding:13px 18px; font-family:inherit; font-size:14.5px; transition:border-color .2s;
  }
  #chat-input-row input:focus{ outline:none; border-color:var(--accent); }
  .send-btn{
    background:linear-gradient(135deg, var(--accent), var(--accent2)); border:none; color:#fff;
    border-radius:50%; width:48px; height:48px; font-weight:900; cursor:pointer; flex-shrink:0; font-size:17px;
    transition:transform .12s; box-shadow:0 6px 16px rgba(91,140,255,.35);
  }
  .send-btn:active{ transform:scale(.88); }

  /* ============ МЕНЮ СООБЩЕНИЯ (реакции/удаление) ============ */
  .msg-menu-backdrop{
    position:absolute; inset:0; background:rgba(0,0,0,.4); z-index:60; display:none;
  }
  .msg-menu-backdrop.open{ display:block; }
  .msg-menu{
    position:absolute; z-index:61; background:var(--panel3); border:1px solid var(--border);
    border-radius:18px; padding:8px; display:none; box-shadow:0 20px 50px rgba(0,0,0,.5);
    animation:popIn .18s cubic-bezier(.34,1.56,.64,1);
  }
  .msg-menu.open{ display:block; }
  .msg-menu-reactions{ display:flex; gap:4px; padding:4px; border-bottom:1px solid var(--border); margin-bottom:6px; }
  .msg-menu-reactions button{
    background:none; border:none; font-size:22px; cursor:pointer; padding:4px; border-radius:10px; transition:transform .12s;
  }
  .msg-menu-reactions button:active{ transform:scale(1.3); }
  .msg-menu-item{
    display:flex; align-items:center; gap:10px; padding:11px 14px; font-size:14px; color:var(--text);
    background:none; border:none; width:100%; text-align:left; cursor:pointer; border-radius:10px;
  }
  .msg-menu-item.danger{ color:var(--danger); }
  .msg-menu-item:active{ background:var(--panel2); }

  /* ============ ЗВОНОК ============ */
  #call-screen{
    align-items:center; justify-content:space-between;
    padding: max(50px, env(safe-area-inset-top)) 30px max(40px, env(safe-area-inset-bottom));
    text-align:center; overflow:hidden;
  }
  #call-bg{
    position:absolute; inset:0; z-index:-1; filter:blur(60px) saturate(1.4); opacity:.5; transform:scale(1.3);
  }
  .call-top{ display:flex; flex-direction:column; align-items:center; margin-top:24px; }
  .call-avatar-wrap{ position:relative; width:132px; height:132px; margin-bottom:26px; }
  .call-avatar{
    width:132px; height:132px; border-radius:50%; font-size:48px;
    display:flex; align-items:center; justify-content:center; font-weight:800; color:#fff;
    box-shadow:0 20px 50px rgba(0,0,0,.4), inset 0 -6px 16px rgba(0,0,0,.2);
    position:relative; z-index:2;
  }
  .pulse-ring{
    position:absolute; inset:0; border-radius:50%; border:2px solid rgba(255,255,255,.35);
    animation:pulseRing 2s infinite ease-out; opacity:0;
  }
  .pulse-ring:nth-child(2){ animation-delay:.5s; }
  .pulse-ring:nth-child(3){ animation-delay:1s; }
  @keyframes pulseRing{
    0%{ transform:scale(1); opacity:.7; } 100%{ transform:scale(1.6); opacity:0; }
  }
  .call-name{ font-size:24px; font-weight:800; }
  .call-status{ font-size:14px; color:var(--muted); margin-top:8px; transition:color .2s; }
  .call-status.connected{ color:var(--success); }
  #call-timer{ font-size:15px; color:var(--success); margin-top:10px; font-variant-numeric:tabular-nums; font-weight:700; }

  .call-controls{ display:flex; gap:28px; align-items:center; justify-content:center; }
  .call-controls.incoming{ gap:64px; }
  .circle-btn{
    width:66px; height:66px; border-radius:50%; border:none; font-size:27px; cursor:pointer;
    display:flex; align-items:center; justify-content:center; color:#fff; transition:transform .12s;
    box-shadow:0 10px 26px rgba(0,0,0,.35);
  }
  .circle-btn.accept{ background:linear-gradient(135deg,var(--success),#17a982); }
  .circle-btn.decline, .circle-btn.end{ background:linear-gradient(135deg,var(--danger),#c81f45); }
  .circle-btn.mute{ background:var(--panel2); border:1px solid var(--border); }
  .circle-btn.mute.active{ background:linear-gradient(135deg, var(--accent), var(--accent2)); border-color:transparent; }
  .circle-btn:active{ transform:scale(.88); }
  .call-controls-label{ display:flex; flex-direction:column; align-items:center; gap:9px; }
  .call-controls-label span{ font-size:11px; color:var(--muted); }

  audio{ display:none; }

  #toast{
    position:absolute; left:50%; top: max(76px, env(safe-area-inset-top)); transform:translateX(-50%) translateY(-14px);
    background:rgba(24,28,42,.96); color:#fff; padding:11px 20px; border-radius:26px;
    font-size:12.5px; font-weight:600; z-index:80; opacity:0; pointer-events:none;
    transition:opacity .25s, transform .25s; border:1px solid var(--border); max-width:82%; text-align:center;
    box-shadow:0 12px 30px rgba(0,0,0,.35);
  }
  #toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<div id="app">

  <!-- ============ ОНБОРДИНГ ============ -->
  <div class="screen active" id="onboarding">
    <div class="logo-wrap">
      <div class="logo-mark">💬</div>
      <h1>ALTASALTA</h1>
      <p>Чат и звонки без регистрации</p>
    </div>
    <div id="onboarding-form">
      <input type="text" id="name-input" placeholder="Как тебя зовут?" maxlength="30">
      <button class="btn-primary" id="onboarding-btn" onclick="completeOnboarding()">Продолжить</button>
      <div class="onboarding-note">Аккаунта нет — это просто имя. Оно хранится у тебя в браузере, не путай с настоящей защищённой учётной записью.</div>
    </div>
  </div>

  <!-- ============ ГЛАВНЫЙ ЭКРАН ============ -->
  <div class="screen" id="main-screen">
    <div id="main-header">
      <h2>Altasalta</h2>
      <button class="header-icon-btn" onclick="openRenamePrompt()">✏️</button>
    </div>
    <div class="tabs-row">
      <button class="tab-btn active" id="tab-chats" onclick="switchMainTab('chats')">Чаты</button>
      <button class="tab-btn" id="tab-online" onclick="switchMainTab('online')">Онлайн сейчас</button>
    </div>
    <div class="list-scroll" id="chats-list"></div>
    <div class="list-scroll" id="online-list" style="display:none;"></div>
  </div>

  <!-- ============ ПЕРЕПИСКА ============ -->
  <div class="screen slide-in-right" id="chat-screen">
    <div id="chat-header">
      <button class="header-icon-btn" onclick="closeChat()">←</button>
      <div class="avatar sm" id="chat-header-avatar"></div>
      <div class="chat-title">
        <div class="name" id="chat-header-name"></div>
        <div class="status" id="chat-header-status">офлайн</div>
      </div>
      <button class="call-btn" onclick="startCall()">📞</button>
    </div>
    <div id="messages-list"></div>
    <div id="chat-input-row">
      <input type="text" id="message-input" placeholder="Сообщение..." maxlength="2000">
      <button class="send-btn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <!-- ============ МЕНЮ СООБЩЕНИЯ ============ -->
  <div class="msg-menu-backdrop" id="msg-menu-backdrop" onclick="closeMsgMenu()"></div>
  <div class="msg-menu" id="msg-menu">
    <div class="msg-menu-reactions" id="msg-menu-reactions">
      <button onclick="reactToMsg('❤️')">❤️</button>
      <button onclick="reactToMsg('😂')">😂</button>
      <button onclick="reactToMsg('👍')">👍</button>
      <button onclick="reactToMsg('😮')">😮</button>
      <button onclick="reactToMsg('😢')">😢</button>
      <button onclick="reactToMsg('🔥')">🔥</button>
    </div>
    <button class="msg-menu-item" onclick="copyMsgText()">📋 Скопировать</button>
    <button class="msg-menu-item danger" id="msg-menu-delete" onclick="deleteMsg()" style="display:none;">🗑️ Удалить</button>
  </div>

  <!-- ============ ЗВОНОК ============ -->
  <div class="screen slide-in-right" id="call-screen">
    <div id="call-bg"></div>
    <div class="call-top">
      <div class="call-avatar-wrap" id="call-avatar-wrap">
        <div class="call-avatar" id="call-avatar"></div>
      </div>
      <div class="call-name" id="call-name"></div>
      <div class="call-status" id="call-status">Вызов...</div>
      <div id="call-timer" style="display:none;">00:00</div>
    </div>

    <div class="call-controls" id="call-controls-outgoing" style="display:none;">
      <div class="call-controls-label">
        <button class="circle-btn end" onclick="endCall()">✕</button>
        <span>Сбросить</span>
      </div>
    </div>

    <div class="call-controls incoming" id="call-controls-incoming" style="display:none;">
      <div class="call-controls-label">
        <button class="circle-btn decline" onclick="declineCall()">✕</button>
        <span>Отклонить</span>
      </div>
      <div class="call-controls-label">
        <button class="circle-btn accept" onclick="acceptCall()">✓</button>
        <span>Ответить</span>
      </div>
    </div>

    <div class="call-controls" id="call-controls-active" style="display:none;">
      <div class="call-controls-label">
        <button class="circle-btn mute" id="mute-btn" onclick="toggleMute()">🎤</button>
        <span>Микрофон</span>
      </div>
      <div class="call-controls-label">
        <button class="circle-btn end" onclick="endCall()">✕</button>
        <span>Завершить</span>
      </div>
    </div>
  </div>

  <div id="toast"></div>
  <audio id="remote-audio" autoplay playsinline></audio>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
/* ================= БАЗОВОЕ СОСТОЯНИЕ ================= */
const socket = io();

let myId = localStorage.getItem('alt_id');
if (!myId){
  myId = 'u_' + Math.random().toString(36).slice(2) + Date.now().toString(36);
  localStorage.setItem('alt_id', myId);
}
let myName = localStorage.getItem('alt_name') || '';

let onlineUsers = new Map();
let currentChatUserId = null;
let currentChatUserName = null;
let currentMainTab = 'chats';
let currentMessages = [];
let typingTimeout = null;
let otherIsTyping = false;

const AVATAR_COLORS = ['#5b8cff','#7c5cff','#34d399','#ff9f43','#ff4d6d','#22c1c3','#f7b731','#a78bfa'];
function colorForName(name){
  let hash = 0;
  for (let i=0;i<(name||'?').length;i++){ hash = name.charCodeAt(i) + ((hash<<5)-hash); }
  return AVATAR_COLORS[Math.abs(hash) % AVATAR_COLORS.length];
}
function initialsForName(name){ return (name || '?').trim().slice(0,1).toUpperCase(); }
function paintAvatar(el, name){
  el.style.background = colorForName(name);
  el.innerText = initialsForName(name);
}
function vibrate(ms){ if (navigator.vibrate) navigator.vibrate(ms); }

function showToast(msg){
  const t = document.getElementById('toast');
  t.innerText = msg;
  t.classList.add('show');
  clearTimeout(showToast._timer);
  showToast._timer = setTimeout(() => t.classList.remove('show'), 2400);
}
function escapeHtml(str){
  const d = document.createElement('div');
  d.innerText = str;
  return d.innerHTML;
}
function timeLabel(ts){
  const d = new Date(ts);
  return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}
function timeAgoShort(ts){
  if (!ts) return '';
  const s = Math.floor((Date.now()-ts)/1000);
  if (s<60) return 'сейчас';
  if (s<3600) return Math.floor(s/60)+' мин';
  if (s<86400) return Math.floor(s/3600)+' ч';
  return Math.floor(s/86400)+' дн';
}
function lastSeenLabel(ts){
  if (!ts) return 'офлайн';
  const s = Math.floor((Date.now()-ts)/1000);
  if (s<60) return 'был(а) только что';
  if (s<3600) return `был(а) ${Math.floor(s/60)} мин назад`;
  if (s<86400) return `был(а) ${Math.floor(s/3600)} ч назад`;
  return `был(а) ${Math.floor(s/86400)} дн назад`;
}

function setScreen(id){
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ---- Синтезированный звук уведомления ---- */
function playNotifSound(){
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(880, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1160, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.0001, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.15, ctx.currentTime + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + 0.25);
    osc.connect(gain).connect(ctx.destination);
    osc.start();
    osc.stop(ctx.currentTime + 0.25);
    setTimeout(() => ctx.close().catch(()=>{}), 400);
  } catch(e){}
}

/* ================= ОНБОРДИНГ ================= */
function completeOnboarding(){
  const input = document.getElementById('name-input');
  const name = input.value.trim().slice(0, 30);
  if (!name) { input.focus(); return; }
  myName = name;
  localStorage.setItem('alt_name', myName);
  enterApp();
}
document.getElementById('name-input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') completeOnboarding();
});

function enterApp(){
  setScreen('main-screen');
  socket.emit('presence:hello', { userId: myId, name: myName });
  renderSkeletonChats();
  loadConversations();
}

function openRenamePrompt(){
  const newName = prompt('Твоё имя:', myName);
  if (!newName) return;
  const trimmed = newName.trim().slice(0, 30);
  if (!trimmed) return;
  myName = trimmed;
  localStorage.setItem('alt_name', myName);
  socket.emit('presence:rename', { userId: myId, name: myName });
  showToast('Имя обновлено');
}

/* ================= ПРИСУТСТВИЕ ================= */
socket.on('presence:list', (list) => {
  onlineUsers = new Map(list.filter(u => u.userId !== myId).map(u => [u.userId, u.name]));
  renderOnlineList();
  renderChatsList();
  updateChatHeaderStatus();
});

function renderOnlineList(){
  const box = document.getElementById('online-list');
  box.innerHTML = '';
  if (onlineUsers.size === 0){
    box.innerHTML = `<div class="empty-block"><div class="big">🌙</div>Сейчас никого нет онлайн.<br>Позови друзей — пусть тоже откроют Altasalta.</div>`;
    return;
  }
  let i = 0;
  onlineUsers.forEach((name, userId) => {
    const row = document.createElement('div');
    row.className = 'chat-row';
    row.style.animationDelay = (i++ * 0.04) + 's';
    row.onclick = () => openChat(userId, name);
    row.innerHTML = `
      <div class="avatar">
        <div class="avatar-ring"></div>
        <div class="online-dot"></div>
      </div>
      <div class="chat-row-body">
        <div class="chat-row-top"><div class="chat-row-name">${escapeHtml(name)}</div></div>
        <div class="chat-row-preview-row"><div class="chat-row-preview">В сети — можно написать или позвонить</div></div>
      </div>
    `;
    paintAvatar(row.querySelector('.avatar'), name);
    box.appendChild(row);
  });
}

function switchMainTab(tab){
  currentMainTab = tab;
  document.getElementById('tab-chats').classList.toggle('active', tab === 'chats');
  document.getElementById('tab-online').classList.toggle('active', tab === 'online');
  document.getElementById('chats-list').style.display = tab === 'chats' ? 'block' : 'none';
  document.getElementById('online-list').style.display = tab === 'online' ? 'block' : 'none';
  if (tab === 'chats') loadConversations();
}

/* ================= СПИСОК ЧАТОВ ================= */
function renderSkeletonChats(){
  const box = document.getElementById('chats-list');
  box.innerHTML = '';
  for (let i=0;i<4;i++){
    const row = document.createElement('div');
    row.className = 'skeleton-row';
    row.innerHTML = `
      <div class="skel avatar"></div>
      <div class="skel-lines">
        <div class="skel skel-line" style="width:${40+Math.random()*30}%"></div>
        <div class="skel skel-line" style="width:${55+Math.random()*30}%; margin-bottom:0;"></div>
      </div>
    `;
    box.appendChild(row);
  }
}

async function loadConversations(){
  try {
    const res = await fetch(`/api/conversations/${myId}`);
    const list = await res.json();
    renderChatsListData(list);
  } catch(e){
    renderChatsListData([]);
  }
}

let lastConversations = [];
function renderChatsListData(list){
  lastConversations = list;
  renderChatsList();
}

function tickIconFor(status){
  if (status === 'read') return '<span class="ticks read">✓✓</span>';
  if (status === 'delivered') return '<span class="ticks other">✓✓</span>';
  return '<span class="ticks other">✓</span>';
}

function renderChatsList(){
  const box = document.getElementById('chats-list');
  box.innerHTML = '';
  if (lastConversations.length === 0){
    box.innerHTML = `<div class="empty-block"><div class="big">💬</div>Пока нет переписок.<br>Перейди во вкладку «Онлайн сейчас» и напиши кому-нибудь первым.</div>`;
    return;
  }
  lastConversations.forEach((c, i) => {
    const row = document.createElement('div');
    row.className = 'chat-row';
    row.style.animationDelay = (i * 0.04) + 's';
    row.onclick = () => openChat(c.userId, c.name);
    const isOnline = onlineUsers.has(c.userId);
    row.innerHTML = `
      <div class="avatar">${isOnline ? '<div class="avatar-ring"></div><div class="online-dot"></div>' : ''}</div>
      <div class="chat-row-body">
        <div class="chat-row-top">
          <div class="chat-row-name">${escapeHtml(c.name)}</div>
          <div class="chat-row-time">${timeAgoShort(c.lastAt)}</div>
        </div>
        <div class="chat-row-preview-row">
          ${c.lastFromMe ? tickIconFor(c.lastStatus) : ''}
          <div class="chat-row-preview">${c.lastMessage ? escapeHtml(c.lastMessage) : 'Нет сообщений'}</div>
          ${c.unread > 0 ? `<div class="unread-badge">${c.unread}</div>` : ''}
        </div>
      </div>
    `;
    paintAvatar(row.querySelector('.avatar'), c.name);
    box.appendChild(row);
  });
}

/* ================= ПЕРЕПИСКА ================= */
async function openChat(userId, name){
  currentChatUserId = userId;
  currentChatUserName = name;
  document.getElementById('chat-header-name').innerText = name;
  paintAvatar(document.getElementById('chat-header-avatar'), name);
  updateChatHeaderStatus();
  setScreen('chat-screen');
  otherIsTyping = false;

  const list = document.getElementById('messages-list');
  list.innerHTML = `<div class="empty-block">Загрузка...</div>`;
  try {
    const res = await fetch(`/api/messages/${myId}/${userId}`);
    currentMessages = await res.json();
    renderMessagesList();
    socket.emit('message:read', { readerId: myId, otherId: userId });
  } catch(e){
    list.innerHTML = `<div class="empty-block">Не удалось загрузить сообщения</div>`;
  }
}

function updateChatHeaderStatus(){
  const el = document.getElementById('chat-header-status');
  if (!el || !currentChatUserId) return;
  const isOnline = onlineUsers.has(currentChatUserId);
  el.innerText = isOnline ? 'в сети' : 'офлайн';
  el.classList.toggle('online', isOnline);
  if (!isOnline){
    fetch(`/api/lastseen/${currentChatUserId}`).then(r => r.json()).then(data => {
      if (currentChatUserId && !onlineUsers.has(currentChatUserId)){
        document.getElementById('chat-header-status').innerText = lastSeenLabel(data.lastSeen);
      }
    }).catch(()=>{});
  }
}

function closeChat(){
  if (currentChatUserId) socket.emit('typing:stop', { toId: currentChatUserId, fromId: myId });
  currentChatUserId = null;
  currentChatUserName = null;
  setScreen('main-screen');
  loadConversations();
}

function renderMessagesList(){
  const list = document.getElementById('messages-list');
  list.innerHTML = '';
  if (currentMessages.length === 0){
    list.innerHTML = `<div class="empty-block"><div class="big">👋</div>Начните переписку с ${escapeHtml(currentChatUserName || '')}</div>`;
    return;
  }
  currentMessages.forEach(m => list.appendChild(renderMessageEl(m)));
  if (otherIsTyping) list.appendChild(buildTypingRow());
  list.scrollTop = list.scrollHeight;
}

function buildTypingRow(){
  const div = document.createElement('div');
  div.className = 'typing-row';
  div.id = 'typing-row';
  div.innerHTML = `
    <div class="typing-bubble">
      <div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>
    </div>
  `;
  return div;
}

function renderMessageEl(m){
  const div = document.createElement('div');
  const mine = m.from === myId;
  div.className = 'msg-row ' + (mine ? 'mine' : 'theirs');
  div.dataset.id = m.id;

  const reactionsHtml = (m.reactions && m.reactions.length > 0)
    ? `<div class="reactions-row">${m.reactions.map(r => `<div class="reaction-chip">${r.emoji}</div>`).join('')}</div>`
    : '';

  if (m.deleted){
    div.innerHTML = `
      <div class="bubble-wrap">
        <div class="bubble msg-deleted">Сообщение удалено</div>
      </div>
    `;
    return div;
  }

  div.innerHTML = `
    <div class="bubble-wrap">
      <div class="bubble" onclick="openMsgMenu(event, '${m.id}')" ontouchstart="msgPressStart(event,'${m.id}')" ontouchend="msgPressEnd()" ontouchmove="msgPressEnd()">${escapeHtml(m.text)}</div>
      <div class="bubble-meta">
        <span class="msg-time">${timeLabel(m.createdAt)}</span>
        ${mine ? `<span class="msg-tick ${m.status === 'read' ? 'read':''}">${m.status === 'sent' ? '✓' : '✓✓'}</span>` : ''}
      </div>
      ${reactionsHtml}
    </div>
  `;
  return div;
}

function sendMessage(){
  const input = document.getElementById('message-input');
  const text = input.value.trim();
  if (!text || !currentChatUserId) return;
  input.value = '';
  socket.emit('typing:stop', { toId: currentChatUserId, fromId: myId });

  socket.emit('message:send', {
    fromId: myId, fromName: myName,
    toId: currentChatUserId, toName: currentChatUserName,
    text
  });
  vibrate(8);
}

const messageInputEl = document.getElementById('message-input');
messageInputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
messageInputEl.addEventListener('input', () => {
  if (!currentChatUserId) return;
  socket.emit('typing:start', { toId: currentChatUserId, fromId: myId });
  clearTimeout(typingTimeout);
  typingTimeout = setTimeout(() => {
    socket.emit('typing:stop', { toId: currentChatUserId, fromId: myId });
  }, 2500);
});

socket.on('typing:update', ({ fromId, typing }) => {
  if (fromId !== currentChatUserId) return;
  otherIsTyping = typing;
  const existing = document.getElementById('typing-row');
  if (typing && !existing){
    const list = document.getElementById('messages-list');
    list.appendChild(buildTypingRow());
    list.scrollTop = list.scrollHeight;
  } else if (!typing && existing){
    existing.remove();
  }
});

socket.on('message:sent', ({ convWith, message }) => {
  if (currentChatUserId === convWith){
    currentMessages.push(message);
    renderMessagesList();
  }
  loadConversations();
});

socket.on('message:new', ({ convWith, message }) => {
  if (currentChatUserId === convWith){
    currentMessages.push(message);
    renderMessagesList();
    socket.emit('message:read', { readerId: myId, otherId: convWith });
  } else {
    playNotifSound();
    vibrate([0,15,60,15]);
    showToast(`${message.fromName}: ${message.text.slice(0,40)}`);
  }
  loadConversations();
});

socket.on('message:status-bulk', ({ convWith, status }) => {
  if (currentChatUserId === convWith){
    currentMessages.forEach(m => { if (m.from === myId) m.status = status; });
    renderMessagesList();
  }
  loadConversations();
});

socket.on('message:reaction', ({ messageId, reactions }) => {
  const m = currentMessages.find(x => x.id === messageId);
  if (m){
    m.reactions = reactions;
    renderMessagesList();
  }
});

socket.on('message:deleted', ({ messageId }) => {
  const m = currentMessages.find(x => x.id === messageId);
  if (m){
    m.deleted = true;
    m.text = '';
    renderMessagesList();
  }
  loadConversations();
});

/* ================= МЕНЮ СООБЩЕНИЯ (реакции / удаление) ================= */
let activeMsgId = null;
let pressTimer = null;

function msgPressStart(e, msgId){
  pressTimer = setTimeout(() => {
    vibrate(12);
    openMsgMenu(e, msgId);
  }, 420);
}
function msgPressEnd(){ clearTimeout(pressTimer); }

function openMsgMenu(e, msgId){
  e.preventDefault();
  activeMsgId = msgId;
  const msg = currentMessages.find(m => m.id === msgId);
  if (!msg || msg.deleted) return;

  document.getElementById('msg-menu-delete').style.display = (msg.from === myId) ? 'flex' : 'none';

  const menu = document.getElementById('msg-menu');
  const backdrop = document.getElementById('msg-menu-backdrop');
  backdrop.classList.add('open');
  menu.classList.add('open');

  const rect = (e.target.closest('.bubble') || e.target).getBoundingClientRect();
  const menuWidth = 260;
  let left = rect.left;
  if (left + menuWidth > window.innerWidth - 10) left = window.innerWidth - menuWidth - 10;
  if (left < 10) left = 10;
  let top = rect.bottom + 8;
  if (top + 220 > window.innerHeight) top = rect.top - 220;

  menu.style.left = left + 'px';
  menu.style.top = top + 'px';
}
function closeMsgMenu(){
  document.getElementById('msg-menu').classList.remove('open');
  document.getElementById('msg-menu-backdrop').classList.remove('open');
  activeMsgId = null;
}
function reactToMsg(emoji){
  if (!activeMsgId || !currentChatUserId) return;
  socket.emit('message:react', { withId: currentChatUserId, messageId: activeMsgId, userId: myId, emoji });
  vibrate(10);
  closeMsgMenu();
}
function copyMsgText(){
  const msg = currentMessages.find(m => m.id === activeMsgId);
  if (msg && navigator.clipboard){
    navigator.clipboard.writeText(msg.text).then(() => showToast('Скопировано'));
  }
  closeMsgMenu();
}
function deleteMsg(){
  if (!activeMsgId || !currentChatUserId) return;
  socket.emit('message:delete', { withId: currentChatUserId, messageId: activeMsgId });
  closeMsgMenu();
}

/* ================= ЗВОНКИ (WebRTC) ================= */
const ICE_SERVERS = [
  { urls: 'stun:stun.l.google.com:19302' },
  { urls: 'stun:stun1.l.google.com:19302' }
];

let pc = null;
let localStream = null;
let callState = 'idle';
let callWithId = null;
let callWithName = null;
let callTimerInterval = null;
let callStartedAt = null;
let pendingIceCandidates = [];
let isMuted = false;

function resetCallUI(){
  document.getElementById('call-controls-outgoing').style.display = 'none';
  document.getElementById('call-controls-incoming').style.display = 'none';
  document.getElementById('call-controls-active').style.display = 'none';
  document.getElementById('call-timer').style.display = 'none';
  document.getElementById('call-status').classList.remove('connected');
  clearInterval(callTimerInterval);
}

function showCallScreen(name, statusText){
  paintAvatar(document.getElementById('call-avatar'), name);
  document.getElementById('call-bg').style.background = colorForName(name);
  document.getElementById('call-name').innerText = name;
  document.getElementById('call-status').innerText = statusText;
  document.getElementById('call-avatar-wrap').innerHTML = `
    <div class="pulse-ring"></div><div class="pulse-ring"></div><div class="pulse-ring"></div>
    <div class="call-avatar" id="call-avatar"></div>
  `;
  paintAvatar(document.getElementById('call-avatar'), name);
  setScreen('call-screen');
}

async function createPeerConnection(){
  pc = new RTCPeerConnection({ iceServers: ICE_SERVERS });

  pc.onicecandidate = (e) => {
    if (e.candidate && callWithId){
      socket.emit('call:ice', { toId: callWithId, candidate: e.candidate });
    }
  };
  pc.ontrack = (e) => {
    document.getElementById('remote-audio').srcObject = e.streams[0];
  };
  pc.onconnectionstatechange = () => {
    if (pc.connectionState === 'connected' && callState !== 'active'){
      callState = 'active';
      callStartedAt = Date.now();
      resetCallUI();
      const statusEl = document.getElementById('call-status');
      statusEl.innerText = 'На связи';
      statusEl.classList.add('connected');
      document.getElementById('call-controls-active').style.display = 'flex';
      document.getElementById('call-timer').style.display = 'block';
      document.querySelectorAll('.pulse-ring').forEach(r => r.remove());
      callTimerInterval = setInterval(updateCallTimer, 1000);
      vibrate(15);
    }
    if (['disconnected','failed','closed'].includes(pc.connectionState) && callState !== 'idle'){
      endCall(true);
    }
  };

  try {
    localStream = await navigator.mediaDevices.getUserMedia({ audio: true });
    localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
  } catch(e){
    showToast('Нет доступа к микрофону');
    throw e;
  }
}

function updateCallTimer(){
  const sec = Math.floor((Date.now() - callStartedAt) / 1000);
  const mm = Math.floor(sec/60).toString().padStart(2,'0');
  const ss = (sec%60).toString().padStart(2,'0');
  document.getElementById('call-timer').innerText = `${mm}:${ss}`;
}

async function startCall(){
  if (!currentChatUserId) return;
  if (!onlineUsers.has(currentChatUserId)){
    showToast(`${currentChatUserName} сейчас не в сети`);
    return;
  }
  callWithId = currentChatUserId;
  callWithName = currentChatUserName;
  callState = 'outgoing';

  showCallScreen(callWithName, 'Вызов...');
  resetCallUI();
  document.getElementById('call-controls-outgoing').style.display = 'flex';

  try {
    await createPeerConnection();
  } catch(e){
    callState = 'idle';
    setScreen('chat-screen');
    return;
  }

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  socket.emit('call:invite', { toId: callWithId, fromId: myId, fromName: myName, offer });
}

socket.on('call:unavailable', () => {
  showToast('Собеседник недоступен');
  endCall(true);
});

socket.on('call:incoming', async ({ fromId, fromName, offer }) => {
  if (callState !== 'idle'){
    socket.emit('call:decline', { toId: fromId });
    return;
  }
  callWithId = fromId;
  callWithName = fromName;
  callState = 'incoming';
  window._incomingOffer = offer;

  showCallScreen(callWithName, 'Входящий звонок');
  resetCallUI();
  document.getElementById('call-controls-incoming').style.display = 'flex';
  playRingtone();
  vibrate([0,300,150,300,150,300]);
});

async function acceptCall(){
  stopRingtone();
  vibrate(15);
  try {
    await createPeerConnection();
  } catch(e){
    declineCall();
    return;
  }
  await pc.setRemoteDescription(new RTCSessionDescription(window._incomingOffer));
  pendingIceCandidates.forEach(c => pc.addIceCandidate(new RTCIceCandidate(c)));
  pendingIceCandidates = [];

  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  socket.emit('call:answer', { toId: callWithId, answer });

  document.getElementById('call-status').innerText = 'Соединение...';
  resetCallUI();
}

function declineCall(){
  stopRingtone();
  vibrate(20);
  if (callWithId) socket.emit('call:decline', { toId: callWithId });
  endCall(true);
}

socket.on('call:answered', async ({ answer }) => {
  if (!pc) return;
  await pc.setRemoteDescription(new RTCSessionDescription(answer));
  pendingIceCandidates.forEach(c => pc.addIceCandidate(new RTCIceCandidate(c)));
  pendingIceCandidates = [];
  document.getElementById('call-status').innerText = 'Соединение...';
});

socket.on('call:ice', ({ candidate }) => {
  if (!candidate) return;
  if (pc && pc.remoteDescription){
    pc.addIceCandidate(new RTCIceCandidate(candidate)).catch(()=>{});
  } else {
    pendingIceCandidates.push(candidate);
  }
});

socket.on('call:declined', () => {
  showToast(`${callWithName || 'Собеседник'} отклонил звонок`);
  endCall(true);
});
socket.on('call:ended', () => {
  showToast('Звонок завершён');
  endCall(true);
});

function endCall(silent){
  stopRingtone();
  if (!silent && callWithId && callState !== 'idle'){
    socket.emit('call:end', { toId: callWithId });
  }
  if (pc){ pc.close(); pc = null; }
  if (localStream){ localStream.getTracks().forEach(t => t.stop()); localStream = null; }

  callState = 'idle';
  callWithId = null;
  callWithName = null;
  pendingIceCandidates = [];
  isMuted = false;
  document.getElementById('mute-btn').classList.remove('active');
  document.getElementById('mute-btn').innerText = '🎤';
  resetCallUI();

  setScreen(currentChatUserId ? 'chat-screen' : 'main-screen');
}

function toggleMute(){
  if (!localStream) return;
  isMuted = !isMuted;
  localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  document.getElementById('mute-btn').classList.toggle('active', isMuted);
  document.getElementById('mute-btn').innerText = isMuted ? '🔇' : '🎤';
  vibrate(6);
}

let ringtoneCtx = null;
let ringtoneInterval = null;
function playRingtone(){
  try {
    ringtoneCtx = new (window.AudioContext || window.webkitAudioContext)();
    const beep = () => {
      if (!ringtoneCtx) return;
      const osc = ringtoneCtx.createOscillator();
      const gain = ringtoneCtx.createGain();
      osc.type = 'sine';
      osc.frequency.value = 740;
      gain.gain.setValueAtTime(0.0001, ringtoneCtx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.2, ringtoneCtx.currentTime + 0.05);
      gain.gain.exponentialRampToValueAtTime(0.0001, ringtoneCtx.currentTime + 0.4);
      osc.connect(gain).connect(ringtoneCtx.destination);
      osc.start();
      osc.stop(ringtoneCtx.currentTime + 0.4);
    };
    beep();
    ringtoneInterval = setInterval(beep, 1200);
  } catch(e){}
}
function stopRingtone(){
  if (ringtoneInterval) clearInterval(ringtoneInterval);
  if (ringtoneCtx) { ringtoneCtx.close().catch(()=>{}); ringtoneCtx = null; }
}

/* ================= СТАРТ ================= */
if (myName){
  enterApp();
} else {
  setScreen('onboarding');
}
</script>
