<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>A1TASALTA</title>
<style>
  :root{
    --bg: #0a0b0d;
    --panel: #14161a;
    --neon: #ff4d6d;
    --neon2: #3ddc97;
    --text: #eef0f2;
    --muted: #8a8f98;
    --border: #22252a;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}
  html,body{
    margin:0; padding:0; height:100%;
    background:var(--bg); color:var(--text);
    font-family: 'Courier New', ui-monospace, monospace;
    overflow:hidden;
  }
  #app{ position:relative; height:100vh; height:100dvh; width:100vw; }

  /* ---------- ЛЕНТА ---------- */
  #feed{
    height:100%; width:100%;
    overflow-y:scroll; scroll-snap-type:y mandatory;
    scrollbar-width:none;
  }
  #feed::-webkit-scrollbar{ display:none; }
  .post{
    height:100vh; height:100dvh; width:100%;
    scroll-snap-align:start;
    position:relative; display:flex; align-items:center; justify-content:center;
    background:#000;
  }
  .post video, .post img{
    max-width:100%; max-height:100%; width:auto; height:auto;
    object-fit:contain;
  }
  .post-overlay{
    position:absolute; left:0; right:0; bottom:0;
    padding:16px 76px 22px 16px;
    background:linear-gradient(to top, rgba(0,0,0,.85), transparent);
    pointer-events:none;
  }
  .post-author{ font-weight:bold; color:var(--neon2); font-size:14px; }
  .post-caption{ font-size:13px; color:var(--text); margin-top:4px; word-break:break-word; }
  .post-time{ font-size:11px; color:var(--muted); margin-top:4px; }

  .post-actions{
    position:absolute; right:10px; bottom:100px;
    display:flex; flex-direction:column; align-items:center; gap:18px;
  }
  .action-btn{
    background:rgba(255,255,255,.08); border:1px solid var(--border);
    border-radius:50%; width:48px; height:48px;
    display:flex; align-items:center; justify-content:center;
    font-size:20px; color:var(--text); cursor:pointer; user-select:none;
  }
  .action-btn:active{ transform:scale(.9); }
  .like-count{ font-size:11px; color:var(--muted); margin-top:2px; text-align:center; }

  #empty-state{
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; text-align:center; padding:24px;
    color:var(--muted);
  }
  #empty-state h2{ color:var(--neon); font-size:20px; letter-spacing:2px; }

  /* ---------- ШАПКА ---------- */
  #topbar{
    position:absolute; top:0; left:0; right:0; z-index:20;
    display:flex; align-items:center; justify-content:space-between;
    padding: max(12px, env(safe-area-inset-top)) 14px 12px 14px;
    background:linear-gradient(to bottom, rgba(0,0,0,.7), transparent);
    pointer-events:none;
  }
  #logo{
    font-weight:bold; letter-spacing:3px; font-size:15px;
    color:var(--text); pointer-events:auto;
  }
  #logo span{ color:var(--neon); }
  #chat-toggle{
    pointer-events:auto;
    background:rgba(255,255,255,.08); border:1px solid var(--border);
    color:var(--text); border-radius:20px; padding:8px 14px; font-size:12px;
    display:flex; align-items:center; gap:6px; cursor:pointer;
  }

  /* ---------- КНОПКА ЗАГРУЗКИ ---------- */
  #upload-fab{
    position:absolute; right:14px; bottom:max(90px, calc(90px + env(safe-area-inset-bottom)));
    z-index:20;
    width:52px; height:52px; border-radius:50%;
    background:var(--neon); color:#000; font-size:26px; font-weight:bold;
    display:flex; align-items:center; justify-content:center;
    border:none; cursor:pointer; box-shadow:0 4px 16px rgba(255,77,109,.4);
  }
  #upload-fab:active{ transform:scale(.92); }

  /* ---------- МОДАЛКА ЗАГРУЗКИ ---------- */
  .modal-backdrop{
    position:absolute; inset:0; background:rgba(0,0,0,.75);
    display:none; align-items:flex-end; justify-content:center; z-index:50;
  }
  .modal-backdrop.open{ display:flex; }
  .modal-sheet{
    width:100%; max-width:480px; background:var(--panel);
    border-top:1px solid var(--border);
    border-radius:18px 18px 0 0; padding:18px;
    padding-bottom: max(18px, env(safe-area-inset-bottom));
  }
  .modal-sheet h3{ margin:0 0 14px 0; letter-spacing:1px; color:var(--neon); font-size:15px; }
  .modal-sheet label{ font-size:11px; color:var(--muted); display:block; margin:10px 0 4px; }
  .modal-sheet input[type="text"]{
    width:100%; background:#0f1013; border:1px solid var(--border);
    color:var(--text); padding:10px; border-radius:8px; font-family:inherit; font-size:14px;
  }
  .file-drop{
    border:1px dashed var(--border); border-radius:10px; padding:20px;
    text-align:center; color:var(--muted); font-size:13px; margin-top:10px; cursor:pointer;
  }
  .file-drop.has-file{ color:var(--neon2); border-color:var(--neon2); }
  .modal-actions{ display:flex; gap:10px; margin-top:16px; }
  .btn{
    flex:1; padding:12px; border-radius:8px; border:none; font-family:inherit;
    font-size:13px; font-weight:bold; letter-spacing:1px; cursor:pointer;
  }
  .btn-cancel{ background:transparent; border:1px solid var(--border); color:var(--muted); }
  .btn-submit{ background:var(--neon); color:#000; }
  .btn-submit:disabled{ opacity:.4; }
  #upload-progress{ font-size:11px; color:var(--neon2); margin-top:8px; display:none; }

  /* ---------- ЧАТ ---------- */
  #chat-panel{
    position:absolute; top:0; right:0; bottom:0; width:100%; max-width:360px;
    background:var(--panel); border-left:1px solid var(--border);
    transform:translateX(100%); transition:transform .25s ease;
    z-index:40; display:flex; flex-direction:column;
  }
  #chat-panel.open{ transform:translateX(0); }
  #chat-header{
    display:flex; align-items:center; justify-content:space-between;
    padding: max(14px, env(safe-area-inset-top)) 14px 12px 14px;
    border-bottom:1px solid var(--border);
  }
  #chat-header h3{ margin:0; font-size:13px; letter-spacing:2px; color:var(--neon2); }
  #chat-close{ background:none; border:none; color:var(--muted); font-size:20px; cursor:pointer; }
  #chat-messages{
    flex:1; overflow-y:auto; padding:12px 14px; display:flex; flex-direction:column; gap:10px;
  }
  .chat-msg .chat-author{ font-size:11px; color:var(--neon2); font-weight:bold; }
  .chat-msg .chat-text{ font-size:13px; color:var(--text); word-break:break-word; }
  .chat-msg .chat-time{ font-size:9px; color:var(--muted); }
  #chat-input-row{
    display:flex; gap:8px; padding:10px; border-top:1px solid var(--border);
    padding-bottom: max(10px, env(safe-area-inset-bottom));
  }
  #chat-input{
    flex:1; background:#0f1013; border:1px solid var(--border); color:var(--text);
    border-radius:20px; padding:10px 14px; font-family:inherit; font-size:13px;
  }
  #chat-send{
    background:var(--neon2); border:none; color:#000; border-radius:20px;
    padding:0 16px; font-weight:bold; cursor:pointer;
  }

  @media (min-width:600px){
    #chat-panel{ max-width:340px; }
  }
</style>
</head>
<body>

<div id="app">

  <div id="topbar">
    <div id="logo">A1<span>TASALTA</span></div>
    <div id="chat-toggle" onclick="toggleChat(true)">💬 ЧАТ</div>
  </div>

  <div id="feed"></div>

  <div id="empty-state" style="display:none;">
    <h2>ПУСТО</h2>
    <p>Пока никто ничего не выложил.<br>Будь первым — нажми на + внизу.</p>
  </div>

  <button id="upload-fab" onclick="openUpload()">+</button>

  <!-- Модалка загрузки -->
  <div class="modal-backdrop" id="upload-modal">
    <div class="modal-sheet">
      <h3>НОВАЯ ПУБЛИКАЦИЯ</h3>
      <div class="file-drop" id="file-drop" onclick="document.getElementById('file-input').click()">
        Нажми, чтобы выбрать фото или видео
      </div>
      <input type="file" id="file-input" accept="image/*,video/*" style="display:none" onchange="onFileChosen()">
      <label>Имя (необязательно)</label>
      <input type="text" id="author-input" placeholder="Гость" maxlength="30">
      <label>Подпись</label>
      <input type="text" id="caption-input" placeholder="Что на видео/фото?" maxlength="200">
      <div id="upload-progress">Загрузка... 0%</div>
      <div class="modal-actions">
        <button class="btn btn-cancel" onclick="closeUpload()">Отмена</button>
        <button class="btn btn-submit" id="submit-btn" onclick="submitUpload()" disabled>Опубликовать</button>
      </div>
    </div>
  </div>

  <!-- Чат -->
  <div id="chat-panel">
    <div id="chat-header">
      <h3>ОБЩИЙ ЧАТ</h3>
      <button id="chat-close" onclick="toggleChat(false)">✕</button>
    </div>
    <div id="chat-messages"></div>
    <div id="chat-input-row">
      <input type="text" id="chat-input" placeholder="Сообщение..." maxlength="500" onkeydown="if(event.key==='Enter')sendChat()">
      <button id="chat-send" onclick="sendChat()">➤</button>
    </div>
  </div>

</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myName = localStorage.getItem('a1t_name') || ('Гость' + Math.floor(Math.random()*9000+1000));
  localStorage.setItem('a1t_name', myName);
  document.getElementById('author-input').placeholder = myName;

  let chosenFile = null;

  // ---------- ЛЕНТА ----------
  function timeAgo(ts){
    const s = Math.floor((Date.now()-ts)/1000);
    if(s<60) return 'только что';
    if(s<3600) return Math.floor(s/60)+' мин назад';
    if(s<86400) return Math.floor(s/3600)+' ч назад';
    return Math.floor(s/86400)+' дн назад';
  }

  function renderPost(p){
    const div = document.createElement('div');
    div.className = 'post';
    div.dataset.id = p.id;

    const media = p.type === 'video'
      ? `<video src="/uploads/${p.filename}" loop muted playsinline preload="metadata"></video>`
      : `<img src="/uploads/${p.filename}" loading="lazy">`;

    div.innerHTML = `
      ${media}
      <div class="post-actions">
        <div>
          <div class="action-btn" onclick="likePost('${p.id}')">❤️</div>
          <div class="like-count" id="likes-${p.id}">${p.likes || 0}</div>
        </div>
      </div>
      <div class="post-overlay">
        <div class="post-author">@${escapeHtml(p.author || 'Гость')}</div>
        ${p.caption ? `<div class="post-caption">${escapeHtml(p.caption)}</div>` : ''}
        <div class="post-time">${timeAgo(p.createdAt)}</div>
      </div>
    `;
    return div;
  }

  function escapeHtml(str){
    const d = document.createElement('div');
    d.innerText = str;
    return d.innerHTML;
  }

  let posts = [];
  async function loadPosts(){
    const res = await fetch('/api/posts');
    posts = await res.json();
    const feed = document.getElementById('feed');
    feed.innerHTML = '';
    if(posts.length === 0){
      document.getElementById('empty-state').style.display = 'flex';
      return;
    }
    document.getElementById('empty-state').style.display = 'none';
    posts.forEach(p => feed.appendChild(renderPost(p)));
    setupVideoAutoplay();
  }

  function setupVideoAutoplay(){
    const feed = document.getElementById('feed');
    const videos = feed.querySelectorAll('video');
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const vid = entry.target;
        if(entry.isIntersecting){ vid.play().catch(()=>{}); }
        else { vid.pause(); }
      });
    }, { threshold: 0.6 });
    videos.forEach(v => {
      observer.observe(v);
      v.addEventListener('click', () => { v.muted = !v.muted; });
    });
  }

  async function likePost(id){
    const res = await fetch(`/api/posts/${id}/like`, { method:'POST' });
    const data = await res.json();
    const el = document.getElementById(`likes-${id}`);
    if(el) el.innerText = data.likes;
  }

  socket.on('new-post', (p) => {
    document.getElementById('empty-state').style.display = 'none';
    const feed = document.getElementById('feed');
    feed.prepend(renderPost(p));
    setupVideoAutoplay();
  });

  socket.on('post-liked', ({id, likes}) => {
    const el = document.getElementById(`likes-${id}`);
    if(el) el.innerText = likes;
  });

  // ---------- ЗАГРУЗКА ----------
  function openUpload(){ document.getElementById('upload-modal').classList.add('open'); }
  function closeUpload(){
    document.getElementById('upload-modal').classList.remove('open');
    chosenFile = null;
    document.getElementById('file-input').value = '';
    document.getElementById('file-drop').innerText = 'Нажми, чтобы выбрать фото или видео';
    document.getElementById('file-drop').classList.remove('has-file');
    document.getElementById('submit-btn').disabled = true;
    document.getElementById('upload-progress').style.display = 'none';
  }
  function onFileChosen(){
    const input = document.getElementById('file-input');
    if(input.files && input.files[0]){
      chosenFile = input.files[0];
      document.getElementById('file-drop').innerText = '✓ ' + chosenFile.name;
      document.getElementById('file-drop').classList.add('has-file');
      document.getElementById('submit-btn').disabled = false;
    }
  }

  function submitUpload(){
    if(!chosenFile) return;
    const author = document.getElementById('author-input').value.trim() || myName;
    const caption = document.getElementById('caption-input').value.trim();

    const fd = new FormData();
    fd.append('media', chosenFile);
    fd.append('author', author);
    fd.append('caption', caption);

    const progressEl = document.getElementById('upload-progress');
    progressEl.style.display = 'block';
    document.getElementById('submit-btn').disabled = true;

    const xhr = new XMLHttpRequest();
    xhr.open('POST', '/api/upload');
    xhr.upload.onprogress = (e) => {
      if(e.lengthComputable){
        const pct = Math.round((e.loaded/e.total)*100);
        progressEl.innerText = `Загрузка... ${pct}%`;
      }
    };
    xhr.onload = () => {
      if(xhr.status === 200){
        closeUpload();
      } else {
        progressEl.innerText = 'Ошибка загрузки :(';
        document.getElementById('submit-btn').disabled = false;
      }
    };
    xhr.onerror = () => {
      progressEl.innerText = 'Ошибка сети';
      document.getElementById('submit-btn').disabled = false;
    };
    xhr.send(fd);
  }

  // ---------- ЧАТ ----------
  function toggleChat(open){
    document.getElementById('chat-panel').classList.toggle('open', open);
  }

  function renderChatMsg(m){
    const div = document.createElement('div');
    div.className = 'chat-msg';
    const t = new Date(m.createdAt);
    const timeStr = t.getHours().toString().padStart(2,'0') + ':' + t.getMinutes().toString().padStart(2,'0');
    div.innerHTML = `
      <div class="chat-author">${escapeHtml(m.author)} <span class="chat-time">${timeStr}</span></div>
      <div class="chat-text">${escapeHtml(m.text)}</div>
    `;
    return div;
  }

  socket.on('chat-history', (history) => {
    const box = document.getElementById('chat-messages');
    box.innerHTML = '';
    history.forEach(m => box.appendChild(renderChatMsg(m)));
    box.scrollTop = box.scrollHeight;
  });

  socket.on('chat-message', (m) => {
    const box = document.getElementById('chat-messages');
    box.appendChild(renderChatMsg(m));
    box.scrollTop = box.scrollHeight;
  });

  function sendChat(){
    const input = document.getElementById('chat-input');
    const text = input.value.trim();
    if(!text) return;
    socket.emit('chat-message', { author: myName, text });
    input.value = '';
  }

  loadPosts();
</script>

</body>
</html>
